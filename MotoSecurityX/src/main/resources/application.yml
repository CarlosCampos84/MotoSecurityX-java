spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:h2:mem:motosecurityx;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

  mvc:
    hiddenmethod:
      filter:
        enabled: true

logging:
  level:
    org.springframework.security: DEBUG

server:
  port: 8081
